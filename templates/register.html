{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <h1 class="site-title">OGEMaster</h1>
    <div class="glass-card">
        <p class="text-center subtitle">Регистрация</p>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
            <div class="form-group">
                <input type="text" class="form-control" name="username" placeholder="Логин" required>
            </div>
            <div class="form-group">
                <input type="email" class="form-control" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-control" name="password" placeholder="Пароль" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-control" name="confirm_password" placeholder="Подтвердите пароль" required>
            </div>
            <button type="submit" class="btn btn-login btn-block">Зарегистрироваться</button>
        </form>

        <div class="text-center mt-3">
            <a href="/login" class="register-link">Уже есть аккаунт? Войти</a>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="admin-detail-full">
    <div class="admin-detail-container">
        <div class="detail-header">
            <a href="/admin/users" class="back-btn">← Назад к списку</a>
            <h2 class="detail-title">Редактирование пользователя</h2>
        </div>

        <div class="user-info-block">
            <div class="info-row">
                <span class="info-label">ID:</span>
                <span class="info-value">{{ user.id }}</span>
            </div>
        </div>

        <form method="post" action="/admin/user/{{ user.id }}/edit" class="edit-form">
            <div class="form-group">
                <label>Никнейм</label>
                <input type="text" name="username" value="{{ user.username }}" required>
            </div>

            <div class="form-group">
                <label>Имя</label>
                <input type="text" name="name" value="{{ user.name or '' }}">
            </div>

            <div class="form-group">
                <label>Фамилия</label>
                <input type="text" name="surname" value="{{ user.surname or '' }}">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ user.email or '' }}">
            </div>

            <div class="form-group">
                <label>Возраст</label>
                <input type="number" name="age" value="{{ user.age or '' }}">
            </div>

            <div class="form-group">
                <label>Страна</label>
                <input type="text" name="country" value="{{ user.country or '' }}">
            </div>

            <div class="form-group">
                <label>Город</label>
                <input type="text" name="city" value="{{ user.city or '' }}">
            </div>

            <div class="form-group">
                <label>Адрес</label>
                <input type="text" name="address" value="{{ user.address or '' }}">
            </div>

            <div class="form-group">
                <label>Должность</label>
                <input type="text" name="position" value="{{ user.position or '' }}">
            </div>

            <div class="form-group">
                <label>Специальность</label>
                <input type="text" name="speciality" value="{{ user.speciality or '' }}">
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Оставьте пустым, чтобы не менять">
            </div>

            <div class="form-group">
                <label>Всего задач</label>
                <input type="number" name="total_tasks" value="{{ user.total_tasks or 0 }}">
            </div>

            <div class="form-group">
                <label>Правильных ответов</label>
                <input type="number" name="correct_tasks" value="{{ user.correct_tasks or 0 }}">
            </div>

            <div class="form-actions">
                <button type="submit" class="save-btn">Сохранить изменения</button>
                <button type="button" onclick="if(confirm('Удалить пользователя?')) window.location.href='/admin/user/{{ user.id }}/delete'" class="delete-btn">Удалить пользователя</button>
            </div>
        </form>
    </div>
</div>

<style>
.admin-detail-full {
    width: 60%;
    margin: 0 auto;
    min-height: 100vh;
    padding: 110px 40px 40px 40px;
}

.admin-detail-container {
    width: 100%;
    background: rgba(0, 0, 0, 0.85);
    border-radius: 20px;
    padding: 30px;
}

body.light-theme .admin-detail-container {
    background: rgba(255, 255, 255, 0.95);
}

.detail-header {
    margin-bottom: 30px;
}

.back-btn {
    display: inline-block;
    margin-bottom: 20px;
    color: #00a8ff;
    text-decoration: none;
}

.back-btn:hover {
    text-decoration: underline;
}

.detail-title {
    font-size: 28px;
    font-weight: 700;
}

body.dark-theme .detail-title {
    color: #fff;
}

body.light-theme .detail-title {
    color: #333;
}

.user-info-block {
    background: rgba(0, 168, 255, 0.1);
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 30px;
}

.info-row {
    margin-bottom: 5px;
}

.info-label {
    font-weight: bold;
    margin-right: 10px;
}

body.dark-theme .info-label {
    color: #00a8ff;
}

body.light-theme .info-label {
    color: #0077ff;
}

.edit-form .form-group {
    margin-bottom: 20px;
}

.edit-form label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
}

body.dark-theme .edit-form label {
    color: #ddd;
}

body.light-theme .edit-form label {
    color: #555;
}

.edit-form input {
    width: 100%;
    padding: 10px 15px;
    border-radius: 8px;
    border: 1px solid;
    font-size: 14px;
}

body.dark-theme .edit-form input {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.3);
    color: #fff;
}

body.light-theme .edit-form input {
    background: rgba(0, 0, 0, 0.05);
    border-color: rgba(0, 0, 0, 0.2);
    color: #333;
}

.form-actions {
    display: flex;
    gap: 15px;
    margin-top: 30px;
}

.save-btn {
    padding: 12px 25px;
    border-radius: 25px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, #00a8ff, #0077ff);
    color: white;
    flex: 1;
}

.delete-btn {
    padding: 12px 25px;
    border-radius: 25px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, #dc3545, #c82333);
    color: white;
    flex: 1;
}

.save-btn:hover, .delete-btn:hover {
    opacity: 0.9;
    transform: translateY(-2px);
}
</style>
{% endblock %}

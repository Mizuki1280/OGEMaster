{% extends "base.html" %}

{% block content %}
<div class="dashboard-full">
    <div class="dashboard-header">
        <h2 class="welcome-title">Редактирование профиля</h2>
    </div>

    <form method="post" class="edit-form">
        <div class="form-group">
            <label>Имя</label>
            <input type="text" name="name" value="{{ user.name }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Фамилия</label>
            <input type="text" name="surname" value="{{ user.surname }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Страна</label>
            <input type="text" name="country" value="{{ user.country or '' }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Город</label>
            <input type="text" name="city" value="{{ user.city or '' }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Адрес</label>
            <input type="text" name="address" value="{{ user.address or '' }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Возраст</label>
            <input type="number" name="age" value="{{ user.age or '' }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Должность</label>
            <input type="text" name="position" value="{{ user.position or '' }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Профессия</label>
            <input type="text" name="speciality" value="{{ user.speciality or '' }}" class="form-control">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-action">Сохранить</button>
            <a href="/profile/{{ user.id }}" class="btn-action cancel">Отмена</a>
        </div>
    </form>
</div>

<style>
.edit-form {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
}

.edit-form .form-group {
    margin-bottom: 15px;
}

.edit-form label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

.form-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 30px;
}

.btn-action.cancel {
    background: #666;
}

.btn-action.cancel:hover {
    background: #555;
}
</style>
{% endblock %}
